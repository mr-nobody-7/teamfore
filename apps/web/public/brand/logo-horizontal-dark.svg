<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44" fill="none">
  <defs>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b7cf8"/>
      <stop offset="100%" stop-color="#6448e8"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mark -->
  <rect width="44" height="44" rx="11" fill="url(#mark-grad)"/>
  <rect width="44" height="44" rx="11" fill="white" fill-opacity="0.06"/>
  <!-- inset highlight -->
  <rect x="0.5" y="0.5" width="43" height="43" rx="10.5" stroke="white" stroke-opacity="0.22" stroke-width="1" fill="none"/>
  <!-- icon: stacked bars (foresight / planning) -->
  <line x1="10" y1="22" x2="34" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="13" y1="15" x2="31" y2="15" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="16" y1="29" x2="28" y2="29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="56" y="29" font-family="'Geist', 'Inter', ui-sans-serif, sans-serif" font-weight="600" font-size="20" letter-spacing="-0.38" fill="#F7F6FC">TeamFore</text>
</svg>
