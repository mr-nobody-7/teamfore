<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a2a"/>
      <stop offset="100%" stop-color="#111019"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7cf8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8b7cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark-g" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(40,0.5,0.5)">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <style>
      .brand { font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif; font-weight: 600; font-size: 28px; fill: #F0EFF8; letter-spacing: -0.5px; }
      .h1    { font-family: Georgia, 'Times New Roman', serif; font-style: normal; font-size: 72px; fill: #F0EFF8; letter-spacing: -1.5px; }
      .h1i   { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 72px; fill: #a78bfa; letter-spacing: -1.5px; }
      .sub   { font-family: 'Courier New', monospace; font-size: 18px; fill: #6b6785; letter-spacing: 2.5px; }
    </style>
  </defs>
  <!-- bg -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- purple glow top-left -->
  <ellipse cx="250" cy="120" rx="400" ry="280" fill="url(#glow)"/>

  <!-- LEFT CONTENT AREA -->
  <!-- mini mark -->
  <rect x="60" y="60" width="52" height="52" rx="12" fill="url(#mark-g)"/>
  <!-- row 0 -->
  <rect x="67"  y="74" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="78"  y="74" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="89"  y="74" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="100" y="74" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <!-- row 1 -->
  <rect x="67"  y="84" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="78"  y="84" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.22"/>
  <rect x="89"  y="84" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="100" y="84" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <!-- row 2 -->
  <rect x="67"  y="94" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="78"  y="94" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.22"/>
  <rect x="89"  y="94" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.90"/>
  <rect x="100" y="94" width="7.5" height="5.5" rx="1.5" fill="white" fill-opacity="0.22"/>

  <text x="124" y="95" class="brand">TeamFore</text>

  <!-- divider bar -->
  <rect x="60" y="148" width="56" height="3" rx="1.5" fill="#8b7cf8" opacity="0.80"/>

  <!-- headline -->
  <text x="60" y="270" class="h1">Team Availability</text>
  <text x="60" y="358" class="h1i">Intelligence.</text>

  <!-- subline -->
  <text x="60" y="430" class="sub">TEAMFORE.COM · 2026</text>

  <!-- RIGHT DECORATIVE GRID (large presence grid pattern) -->
  <!-- We draw a big 5×3 grid on the right, decoratively -->
  <!-- Using a large-scale grid: 5 cols × 3 rows, each cell ~90×56, gap 14 -->
  <!-- Grid area: x=680..1170, y=120..450 -->
  <!-- col positions: 680, 786, 892, 998, 1064... let me recalculate -->
  <!-- width avail: 1170-680 = 490; 5 cols, 4 gaps: cellW=(490-4*14)/5 = (490-56)/5 = 434/5 = 86.8 -->
  <!-- height avail: 450-120 = 330; 3 rows, 2 gaps: cellH=(330-2*20)/3 = 290/3 = 96.7 -->
  <g opacity="0.55">
    <!-- row 0 -->
    <rect x="680"  y="140" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="781"  y="140" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="882"  y="140" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="983"  y="140" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="1084" y="140" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <!-- row 1 -->
    <rect x="680"  y="242" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="781"  y="242" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="882"  y="242" width="87" height="82" rx="12" fill="white" fill-opacity="0.22"/>
    <rect x="983"  y="242" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="1084" y="242" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <!-- row 2 -->
    <rect x="680"  y="344" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="781"  y="344" width="87" height="82" rx="12" fill="white" fill-opacity="0.22"/>
    <rect x="882"  y="344" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
    <rect x="983"  y="344" width="87" height="82" rx="12" fill="white" fill-opacity="0.22"/>
    <rect x="1084" y="344" width="87" height="82" rx="12" fill="white" fill-opacity="0.90"/>
  </g>

  <!-- vertical fade on the decorative grid left edge -->
  <defs>
    <linearGradient id="fade-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111019" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111019" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="640" y="0" width="100" height="630" fill="url(#fade-l)"/>
</svg>
