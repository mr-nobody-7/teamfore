<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b1928"/>
      <stop offset="100%" stop-color="#14121f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="0%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6448e8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="110%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="mark-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9d8ffb"/>
      <stop offset="100%" stop-color="#5e3fde"/>
    </linearGradient>
    <linearGradient id="mark-sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- decorative capacity rings — right side -->
  <circle cx="960" cy="315" r="190" stroke="#6448e8" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>
  <circle cx="960" cy="315" r="140" stroke="#6448e8" stroke-opacity="0.10" stroke-width="1.5" fill="none"/>
  <circle cx="960" cy="315" r="90"  stroke="#6448e8" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
  <!-- arc indicators -->
  <circle cx="960" cy="315" r="190" stroke="#8b7cf8" stroke-opacity="0.55" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-dasharray="1195" stroke-dashoffset="215"
    transform="rotate(-90 960 315)"/>
  <circle cx="960" cy="315" r="140" stroke="#5bbcaa" stroke-opacity="0.55" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-dasharray="880" stroke-dashoffset="220"
    transform="rotate(-90 960 315)"/>
  <circle cx="960" cy="315" r="90" stroke="#d9a733" stroke-opacity="0.55" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="200"
    transform="rotate(-90 960 315)"/>

  <!-- left content area -->
  <!-- logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="17" fill="url(#mark-g)"/>
  <rect x="80" y="80" width="72" height="36" rx="17" fill="url(#mark-sh)"/>
  <rect x="80.75" y="80.75" width="70.5" height="70.5" rx="16.25" stroke="white" stroke-opacity="0.22" stroke-width="1.5" fill="none"/>
  <line x1="100" y1="116" x2="132" y2="116" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="105" y1="104" x2="127" y2="104" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="110" y1="128" x2="122" y2="128" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- brand name -->
  <text x="170" y="131" font-family="'Geist', 'Inter', system-ui, sans-serif" font-weight="600" font-size="32" letter-spacing="-0.6" fill="#F7F6FC">TeamFore</text>

  <!-- headline -->
  <text x="80" y="290" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="72" letter-spacing="-1.5" fill="#F7F6FC">Team Availability</text>
  <text x="80" y="372" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="72" letter-spacing="-1.5" fill="#8b7cf8" font-style="italic">Intelligence.</text>

  <!-- sub -->
  <text x="82" y="432" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="22" fill="#7f7b9e" letter-spacing="0">For engineering managers who plan the week.</text>

  <!-- bottom bar -->
  <rect x="80" y="568" width="48" height="3" rx="2" fill="#8b7cf8" fill-opacity="0.8"/>
  <text x="80" y="605" font-family="'Geist Mono', 'Courier New', monospace" font-size="14" letter-spacing="0.12em" fill="#5a566e" text-transform="uppercase">TEAMFORE.COM · PHASE 1 · 2026</text>
</svg>
