  <rect x="78"  y="81" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.22"/>
  <rect x="89"  y="81" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
  <rect x="100" y="81" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
  <rect x="67"  y="91" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
  <rect x="78"  y="91" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.22"/>
  <rect x="89"  y="91" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
  <rect x="100" y="91" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.22"/>

  <text x="122" y="90" class="brand">TeamFore</text>
  <rect x="60" y="140" width="52" height="3" rx="1.5" fill="#8b7cf8" opacity="0.80"/>

  <text x="60" y="252" class="h1">Team Availability</text>
  <text x="60" y="330" class="h1i">Intelligence.</text>
  <text x="60" y="400" class="sub">TEAMFORE.COM</text>

  <!-- decorative grid right -->
  <g opacity="0.50">
    <rect x="660"  y="120" width="84" height="76" rx="11" fill="white" fill-opacity="0.90"/>
    <rect x="758"  y="120" width="84" height="76" rx="11" fill="white" fill-opacity="0.90"/>
