<svg viewBox="0 0 1200 600" width="1200" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a2a"/>
      <stop offset="100%" stop-color="#111019"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b7cf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b7cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark-g" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(40,0.5,0.5)">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="fade-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111019" stop-opacity="1"/>
      <stop offset="100%" stop-color="#111019" stop-opacity="0"/>
    </linearGradient>
    <style>
      .brand { font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif; font-weight: 600; font-size: 26px; fill: #F0EFF8; letter-spacing: -0.5px; }
      .h1    { font-family: Georgia, 'Times New Roman', serif; font-style: normal; font-size: 66px; fill: #F0EFF8; letter-spacing: -1.5px; }
      .h1i   { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 66px; fill: #a78bfa; letter-spacing: -1.5px; }
      .sub   { font-family: 'Courier New', monospace; font-size: 16px; fill: #6b6785; letter-spacing: 2.5px; }
    </style>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <ellipse cx="250" cy="110" rx="380" ry="260" fill="url(#glow)"/>

  <!-- mini mark -->
  <rect x="60" y="58" width="50" height="50" rx="11" fill="url(#mark-g)"/>
  <rect x="67"  y="71" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
  <rect x="78"  y="71" width="7" height="5.2" rx="1.4" fill="white" fill-opacity="0.90"/>
