<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b1928"/>
      <stop offset="100%" stop-color="#13111d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="10%" cy="0%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6448e8" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="mark-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9d8ffb"/>
      <stop offset="100%" stop-color="#5e3fde"/>
    </linearGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow1)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>

  <!-- Right rings -->
  <circle cx="980" cy="300" r="180" stroke="#6448e8" stroke-opacity="0.10" stroke-width="1.5" fill="none"/>
  <circle cx="980" cy="300" r="130" stroke="#6448e8" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
  <circle cx="980" cy="300" r="180" stroke="#8b7cf8" stroke-opacity="0.5" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-dasharray="1130" stroke-dashoffset="200"
    transform="rotate(-90 980 300)"/>
  <circle cx="980" cy="300" r="130" stroke="#5bbcaa" stroke-opacity="0.5" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-dasharray="816" stroke-dashoffset="220"
    transform="rotate(-90 980 300)"/>

  <!-- Logo mark -->
  <rect x="80" y="76" width="66" height="66" rx="15" fill="url(#mark-g)"/>
  <rect x="80.75" y="76.75" width="64.5" height="64.5" rx="14.25" stroke="white" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <line x1="98" y1="109" x2="128" y2="109" stroke="white" stroke-width="4.2" stroke-linecap="round"/>
  <line x1="103" y1="98"  x2="123" y2="98"  stroke="white" stroke-width="4.2" stroke-linecap="round"/>
  <line x1="108" y1="120" x2="118" y2="120" stroke="white" stroke-width="4.2" stroke-linecap="round"/>
  <text x="163" y="121" font-family="'Geist', 'Inter', system-ui, sans-serif" font-weight="600" font-size="28" letter-spacing="-0.5" fill="#F0EFF8">TeamFore</text>

  <!-- Headline -->
  <text x="80" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="68" letter-spacing="-1.2" fill="#F0EFF8">Team Availability</text>
  <text x="80" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="68" letter-spacing="-1.2" fill="#8b7cf8" font-style="italic">Intelligence.</text>
  <text x="82" y="408" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="20" fill="#6b6785">For engineering managers who plan the week.</text>

  <rect x="80" y="530" width="44" height="3" rx="2" fill="#8b7cf8" fill-opacity="0.75"/>
  <text x="80" y="566" font-family="'Geist Mono', 'Courier New', monospace" font-size="13" letter-spacing="0.12em" fill="#4d495f">TEAMFORE.COM</text>
</svg>
