services:
  - type: web
    name: teamfore-api
    runtime: node
    buildCommand: pnpm --filter backend run build:render
    startCommand: pnpm --filter backend start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TEAM_MIN_CAPACITY_WARNING_PERCENT
        value: "50"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
